spring.application.name=fhc
server.port=8090

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.web.servlet.error.ErrorMvcAutoConfiguration

security.filter-order=5
management.metrics.distribution.percentiles.http.server.requests=0.95,0.99,0.999,1.0

# Enable response compression
server.compression.enabled=true

# The comma-separated list of mime types that should be compressed
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json

# Compress the response only if the response size is at least 1KB
server.compression.min-response-size=1024

server.http2.enabled=true

spring.threads.virtual.enabled=true

ozone.url=https://taktik.io
jwt.subject=fhc
jwt.algorithm=HS512

mycarenet.timezone=Europe/Brussels

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Rate limiting (disabled by default)
fhc.ratelimit.enabled=false
fhc.ratelimit.key-header=X-FHC-keystoreId
fhc.ratelimit.fallback-key-header=X-FHC-tokenId
fhc.ratelimit.window-seconds=60
fhc.ratelimit.max-requests=100
fhc.ratelimit.anonymous-limit=20
fhc.ratelimit.excluded-paths=/sts/keystore,/actuator/**

# Per-endpoint group limits (50/min for high-frequency services, 10/min for the rest)
fhc.ratelimit.groups.genins.path-patterns=/genins/**
fhc.ratelimit.groups.genins.max-requests=50
fhc.ratelimit.groups.mda.path-patterns=/mda/**
fhc.ratelimit.groups.mda.max-requests=50
fhc.ratelimit.groups.ehbox.path-patterns=/ehbox/**,/ehboxV3/**
fhc.ratelimit.groups.ehbox.max-requests=50
fhc.ratelimit.groups.eattest.path-patterns=/eattest/**,/eattestv2/**,/eattestv3/**
fhc.ratelimit.groups.eattest.max-requests=50
fhc.ratelimit.groups.recipe.path-patterns=/recipe/**
fhc.ratelimit.groups.recipe.max-requests=50
fhc.ratelimit.groups.tarif.path-patterns=/tarif/**
fhc.ratelimit.groups.tarif.max-requests=50
fhc.ratelimit.groups.addressbook.path-patterns=/ab/**
fhc.ratelimit.groups.addressbook.max-requests=10
